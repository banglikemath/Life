<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>LIFE Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    --bg:#0b0f0c;
    --bg-elev:#121712;
    --bg-elev2:#182018;
    --card:#141a14;
    --card-hover:#1a221a;
    --border:#26302650;
    --border-strong:#2f3c2f;
    --lime:#7fd858;
    --lime-dim:#5fa840;
    --lime-soft:#7fd8581a;
    --sage:#9db8a4;
    --text:#e8f0e6;
    --text-2:#9db8a4;
    --text-3:#6b7d6c;
    --warn:#e0b755;
    --warn-soft:#e0b7551a;
    --danger:#e07a5c;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Sora',system-ui,sans-serif;}
  body{padding-bottom:40px;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:4px;}
  .wrap{max-width:820px;margin:0 auto;padding:18px 16px;}
  .row{display:flex;align-items:center;}
  .btn{font-family:inherit;font-size:13px;border:1px solid var(--border-strong);background:transparent;color:var(--text);
    padding:8px 14px;border-radius:9px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:.15s;}
  .btn:hover{background:var(--card-hover);}
  .btn:active{transform:scale(.97);}
  .btn-primary{background:var(--lime);color:#0b0f0c;border-color:var(--lime);font-weight:600;}
  .btn-primary:hover{background:var(--lime-dim);}
  .btn-ghost{border-color:transparent;color:var(--text-2);padding:6px 8px;}
  .btn-ghost:hover{background:var(--card-hover);color:var(--text);}
  .btn-sm{font-size:11px;padding:5px 10px;}
  input,textarea,select{font-family:inherit;font-size:14px;background:var(--bg-elev2);color:var(--text);
    border:1px solid var(--border-strong);border-radius:8px;padding:9px 11px;width:100%;outline:none;}
  input:focus,textarea:focus{border-color:var(--lime-dim);}
  label{font-size:12px;color:var(--text-2);display:block;margin-bottom:5px;}
  .chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 9px;border-radius:20px;}
  .fade{animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
  .modal-bg{position:fixed;inset:0;background:#000000aa;display:flex;align-items:flex-end;justify-content:center;z-index:50;}
  @media(min-width:640px){.modal-bg{align-items:center;}}
  .modal{background:var(--bg-elev);border:1px solid var(--border-strong);border-radius:16px 16px 0 0;
    width:100%;max-width:520px;max-height:88vh;overflow-y:auto;padding:20px;}
  @media(min-width:640px){.modal{border-radius:16px;}}
  .track-line{width:2px;background:var(--border-strong);flex:none;}
  .focus-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;scroll-snap-type:x mandatory;}
  .focus-scroll::-webkit-scrollbar{height:0;}
  .focus-card{scroll-snap-align:start;}
  @media(min-width:640px){.focus-scroll{display:grid;grid-template-columns:repeat(3,1fr);}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

/* ============ CONFIG ============ */
// Cole aqui a URL do seu Web App após publicar o Code.gs (Implantar > App da Web)
const API_URL = ""; // ex: "https://script.google.com/macros/s/AKfy.../exec"
const LS_KEY = "life_dashboard_v1";

const CATEGORIAS = [
  { nome: "Lazer e Música", emoji: "🎻" },
  { nome: "Estudos", emoji: "📚" },
  { nome: "Trabalho e Consultoria", emoji: "💼" },
  { nome: "Bem-estar e Espiritualidade", emoji: "🌿" },
  { nome: "Casa e Rotina", emoji: "🏠" },
  { nome: "Treinos", emoji: "💪" },
];

/* ============ HELPERS ============ */
const uid = () => Math.random().toString(36).slice(2, 9);
const todayISO = () => new Date().toISOString().slice(0, 10);
const isoWeek = (d) => {
  const dt = new Date(d); dt.setHours(0,0,0,0);
  dt.setDate(dt.getDate() + 3 - ((dt.getDay() + 6) % 7));
  const wk1 = new Date(dt.getFullYear(), 0, 4);
  return dt.getFullYear() + "-" + (1 + Math.round(((dt - wk1) / 86400000 - 3 + ((wk1.getDay() + 6) % 7)) / 7));
};
const daysSince = (iso) => {
  if (!iso) return null;
  const diff = Date.now() - new Date(iso).getTime();
  return Math.floor(diff / 86400000);
};

// Estrutura em memória: lista de projetos, cada um com etapas.
// Persistência: no Sheets é 1 linha por etapa; aqui agrupamos.
function rowsToProjects(rows) {
  const map = {};
  rows.forEach(r => {
    const key = r.projeto + "||" + r.tipo;
    if (!map[key]) {
      map[key] = {
        projeto: r.projeto, categoria: r.categoria, emoji: r.emoji,
        tipo: r.tipo || "Projeto", rotinaFreq: r.rotinaFreq || "Diaria",
        favorito: !!r.favorito, ultimoAvanco: r.ultimoAvanco || "",
        etapas: []
      };
    }
    map[key].favorito = map[key].favorito || !!r.favorito;
    if (r.ultimoAvanco > map[key].ultimoAvanco) map[key].ultimoAvanco = r.ultimoAvanco;
    map[key].etapas.push({ id: r.id || uid(), texto: r.etapa, ordem: r.ordem || 0, concluida: !!r.concluida });
  });
  return Object.values(map).map(p => {
    p.etapas.sort((a,b) => a.ordem - b.ordem);
    return p;
  });
}
function projectsToRows(projects) {
  const rows = [];
  projects.forEach(p => {
    if (!p.etapas.length) {
      rows.push({ id: uid(), categoria: p.categoria, projeto: p.projeto, emoji: p.emoji,
        tipo: p.tipo, rotinaFreq: p.rotinaFreq, etapa: "", ordem: 0,
        concluida: false, favorito: p.favorito, ultimoAvanco: p.ultimoAvanco });
      return;
    }
    p.etapas.forEach((e, i) => {
      rows.push({ id: e.id, categoria: p.categoria, projeto: p.projeto, emoji: p.emoji,
        tipo: p.tipo, rotinaFreq: p.rotinaFreq, etapa: e.texto, ordem: i,
        concluida: e.concluida, favorito: p.favorito, ultimoAvanco: p.ultimoAvanco });
    });
  });
  return rows;
}

async function apiCall(payload) {
  if (!API_URL) throw new Error("no-api");
  const res = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(payload),
  });
  return res.json();
}

/* ============ APP ============ */
function App() {
  const [projects, setProjects] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [syncState, setSyncState] = useState("idle"); // idle|saving|ok|err
  const [editing, setEditing] = useState(null); // projeto em edição ou "new"
  const dirty = useRef(false);

  // Carrega do localStorage na abertura
  useEffect(() => {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) {
      try {
        const data = JSON.parse(raw);
        setProjects(resetRotinas(data.projects || []));
      } catch(e) {}
    }
    setLoaded(true);
  }, []);

  // Salva local a cada mudança
  useEffect(() => {
    if (!loaded) return;
    localStorage.setItem(LS_KEY, JSON.stringify({ projects, savedAt: Date.now() }));
    dirty.current = true;
  }, [projects, loaded]);

  // Reseta rotinas cujo último check não é de hoje/desta semana
  function resetRotinas(list) {
    return list.map(p => {
      if (p.tipo !== "Rotina") return p;
      const stale = p.rotinaFreq === "Semanal"
        ? isoWeek(p.ultimoAvanco) !== isoWeek(todayISO())
        : p.ultimoAvanco !== todayISO();
      if (stale && p.etapas[0]) {
        return { ...p, etapas: [{ ...p.etapas[0], concluida: false }] };
      }
      return p;
    });
  }

  const projetos = useMemo(() => projects.filter(p => p.tipo === "Projeto"), [projects]);
  const rotinas  = useMemo(() => projects.filter(p => p.tipo === "Rotina"), [projects]);
  const favoritos = useMemo(() => projetos.filter(p => p.favorito), [projetos]);

  const porCategoria = useMemo(() => {
    const g = {};
    projetos.forEach(p => { (g[p.categoria] = g[p.categoria] || []).push(p); });
    return g;
  }, [projetos]);

  function setProject(target, patch) {
    setProjects(prev => prev.map(p => p === target ? { ...p, ...patch } : p));
  }
  function removeProject(target) {
    setProjects(prev => prev.filter(p => p !== target));
  }

  // Avançar: marca a primeira etapa não concluída
  function avancar(target) {
    setProjects(prev => prev.map(p => {
      if (p !== target) return p;
      const etapas = [...p.etapas];
      const next = etapas.findIndex(e => !e.concluida);
      if (next >= 0) etapas[next] = { ...etapas[next], concluida: true };
      return { ...p, etapas, ultimoAvanco: todayISO() };
    }));
  }
  function toggleEtapa(target, etapaId) {
    setProjects(prev => prev.map(p => {
      if (p !== target) return p;
      const etapas = p.etapas.map(e => e.id === etapaId ? { ...e, concluida: !e.concluida } : e);
      return { ...p, etapas, ultimoAvanco: todayISO() };
    }));
  }
  function toggleFav(target) {
    const favCount = favoritos.length;
    if (!target.favorito && favCount >= 3) {
      if (!confirm("Você já tem 3 no Foco Agora. Foco demais = foco nenhum 😅. Adicionar mesmo assim?")) return;
    }
    setProject(target, { favorito: !target.favorito });
  }
  function toggleRotina(target) {
    setProjects(prev => prev.map(p => {
      if (p !== target) return p;
      const done = p.etapas[0] && p.etapas[0].concluida;
      return { ...p, etapas: [{ id: p.etapas[0] ? p.etapas[0].id : uid(), texto: p.projeto, ordem: 0, concluida: !done }],
        ultimoAvanco: !done ? todayISO() : p.ultimoAvanco };
    }));
  }

  function saveEdited(proj, isNew) {
    if (isNew) setProjects(prev => [...prev, proj]);
    else setProjects(prev => prev.map(p => p === editing.ref ? proj : p));
    setEditing(null);
  }

  async function sync() {
    setSyncState("saving");
    try {
      await apiCall({ action: "sync", rows: projectsToRows(projects) });
      setSyncState("ok");
      dirty.current = false;
      setTimeout(() => setSyncState("idle"), 2000);
    } catch(e) {
      setSyncState(e.message === "no-api" ? "noapi" : "err");
      setTimeout(() => setSyncState("idle"), 3500);
    }
  }
  async function pull() {
    setSyncState("saving");
    try {
      const r = await apiCall({ action: "getAll" });
      if (r.ok) {
        setProjects(resetRotinas(rowsToProjects(r.rows)));
        setSyncState("ok");
        setTimeout(() => setSyncState("idle"), 2000);
      } else throw new Error(r.error);
    } catch(e) {
      setSyncState(e.message === "no-api" ? "noapi" : "err");
      setTimeout(() => setSyncState("idle"), 3500);
    }
  }

  if (!loaded) return null;

  return (
    <div className="wrap">
      <Header syncState={syncState} onSync={sync} onPull={pull} hasApi={!!API_URL} />

      {favoritos.length > 0 && <FocusBand favoritos={favoritos} />}

      <div className="row" style={{justifyContent:"space-between",margin:"22px 0 12px"}}>
        <div className="row" style={{gap:8}}>
          <span style={{fontSize:16,fontWeight:600}}>Projetos</span>
          <span style={{fontSize:12,color:"var(--text-3)"}}>{projetos.length}</span>
        </div>
        <button className="btn btn-primary btn-sm" onClick={() => setEditing({ ref:"new", tipo:"Projeto" })}>+ Novo projeto</button>
      </div>

      {projetos.length === 0 && (
        <EmptyState onAdd={() => setEditing({ ref:"new", tipo:"Projeto" })} />
      )}

      {CATEGORIAS.filter(c => porCategoria[c.nome]).map(c => (
        <CategoriaBloco key={c.nome} cat={c} projetos={porCategoria[c.nome]}
          onAvancar={avancar} onToggleEtapa={toggleEtapa} onFav={toggleFav}
          onEdit={p => setEditing({ ref:p, ...p })} onRemove={removeProject} />
      ))}

      <RotinasFooter rotinas={rotinas} onToggle={toggleRotina}
        onAdd={() => setEditing({ ref:"new", tipo:"Rotina" })} onRemove={removeProject} />

      {editing && (
        <EditorModal editing={editing} onClose={() => setEditing(null)} onSave={saveEdited} />
      )}
    </div>
  );
}

function Header({ syncState, onSync, onPull, hasApi }) {
  const label = { idle:"Sincronizar", saving:"Sincronizando…", ok:"Sincronizado ✓", err:"Erro ✕", noapi:"Configure a API" }[syncState];
  return (
    <div className="row" style={{justifyContent:"space-between"}}>
      <div className="row" style={{gap:9}}>
        <span style={{fontSize:22}}>🌱</span>
        <div>
          <div style={{fontSize:19,fontWeight:700,letterSpacing:"-.02em"}}>LIFE Dashboard</div>
          <div style={{fontSize:11,color:"var(--text-3)"}}>onde você parou, e o próximo passo</div>
        </div>
      </div>
      <div className="row" style={{gap:6}}>
        {hasApi && <button className="btn btn-ghost btn-sm" onClick={onPull} title="Puxar do Sheets">↓</button>}
        <button className="btn btn-sm" onClick={onSync}
          style={syncState==="ok"?{borderColor:"var(--lime)",color:"var(--lime)"}:syncState==="err"?{borderColor:"var(--danger)",color:"var(--danger)"}:{}}>
          {label}
        </button>
      </div>
    </div>
  );
}

function FocusBand({ favoritos }) {
  return (
    <div style={{background:"var(--lime-soft)",border:"1px solid #7fd85830",borderRadius:14,padding:14,marginTop:18}}>
      <div className="row" style={{gap:6,marginBottom:11}}>
        <span style={{fontSize:15}}>🔥</span>
        <span style={{fontSize:13,fontWeight:600,color:"var(--lime)"}}>Foco agora</span>
      </div>
      <div className="focus-scroll">
        {favoritos.map((p,i) => {
          const next = p.etapas.find(e => !e.concluida);
          const done = p.etapas.filter(e => e.concluida).length;
          const total = p.etapas.length || 1;
          return (
            <div key={i} className="focus-card fade" style={{minWidth:190,background:"var(--card)",borderRadius:11,padding:13,border:"1px solid var(--border)"}}>
              <div className="row" style={{justifyContent:"space-between",marginBottom:9}}>
                <span style={{fontSize:12,color:"var(--text-2)"}}>{p.emoji} {p.projeto}</span>
                <span style={{color:"var(--warn)"}}>★</span>
              </div>
              <div style={{fontSize:11,color:"var(--text-3)",marginBottom:3}}>Próximo passo</div>
              <div style={{fontSize:14,fontWeight:600,marginBottom:11,minHeight:38,lineHeight:1.3}}>
                {next ? next.texto : "🎉 Trilha concluída!"}
              </div>
              <div className="row" style={{gap:6}}>
                <div style={{flex:1,height:5,background:"var(--border-strong)",borderRadius:3,overflow:"hidden"}}>
                  <div style={{width:(done/total*100)+"%",height:"100%",background:"var(--lime)"}}></div>
                </div>
                <span style={{fontSize:10,color:"var(--text-3)"}}>{done}/{total}</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function statusBadge(p) {
  const d = daysSince(p.ultimoAvanco);
  const allDone = p.etapas.length && p.etapas.every(e => e.concluida);
  if (allDone) return { txt:"✓ concluído", bg:"var(--lime-soft)", c:"var(--lime)" };
  if (d === null) return null;
  if (d === 0) return { txt:"avançou hoje", bg:"var(--lime-soft)", c:"var(--lime)" };
  if (d === 1) return { txt:"avançou ontem", bg:"var(--lime-soft)", c:"var(--lime)" };
  if (d >= 5) return { txt:`parado há ${d} dias`, bg:"var(--warn-soft)", c:"var(--warn)" };
  return { txt:`há ${d} dias`, bg:"transparent", c:"var(--text-3)" };
}

function CategoriaBloco({ cat, projetos, onAvancar, onToggleEtapa, onFav, onEdit, onRemove }) {
  const [open, setOpen] = useState(true);
  const totalEtapas = projetos.reduce((s,p) => s + p.etapas.length, 0);
  const doneEtapas = projetos.reduce((s,p) => s + p.etapas.filter(e=>e.concluida).length, 0);
  return (
    <div style={{marginBottom:14}}>
      <div className="row" onClick={() => setOpen(!open)}
        style={{justifyContent:"space-between",cursor:"pointer",padding:"8px 2px",borderBottom:"1px solid var(--border)"}}>
        <div className="row" style={{gap:7}}>
          <span style={{color:"var(--text-3)",fontSize:13,transform:open?"rotate(90deg)":"none",transition:".15s"}}>▸</span>
          <span style={{fontSize:14,fontWeight:600}}>{cat.emoji} {cat.nome}</span>
        </div>
        <span style={{fontSize:11,color:"var(--text-3)"}}>{doneEtapas}/{totalEtapas}</span>
      </div>
      {open && projetos.map((p,i) => (
        <ProjectCard key={i} p={p} onAvancar={onAvancar} onToggleEtapa={onToggleEtapa}
          onFav={onFav} onEdit={onEdit} onRemove={onRemove} />
      ))}
    </div>
  );
}

function ProjectCard({ p, onAvancar, onToggleEtapa, onFav, onEdit, onRemove }) {
  const st = statusBadge(p);
  const nextIdx = p.etapas.findIndex(e => !e.concluida);
  return (
    <div className="fade" style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:13,padding:14,marginTop:10}}>
      <div className="row" style={{justifyContent:"space-between",marginBottom:12}}>
        <div className="row" style={{gap:8,minWidth:0}}>
          <span style={{fontSize:14,fontWeight:600}}>{p.emoji} {p.projeto}</span>
        </div>
        <div className="row" style={{gap:8,flex:"none"}}>
          {st && <span className="chip" style={{background:st.bg,color:st.c}}>{st.txt}</span>}
          <span onClick={() => onFav(p)} style={{cursor:"pointer",color:p.favorito?"var(--warn)":"var(--text-3)",fontSize:16}}>★</span>
          <span onClick={() => onEdit(p)} style={{cursor:"pointer",color:"var(--text-3)",fontSize:14}}>✎</span>
        </div>
      </div>

      <div>
        {p.etapas.map((e, i) => {
          const isNext = i === nextIdx;
          if (isNext) {
            return (
              <div key={e.id} className="row" style={{gap:10,padding:"9px 11px",background:"var(--lime-soft)",borderRadius:9,margin:"3px 0"}}>
                <span style={{color:"var(--lime)",fontSize:16}}>▷</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:10,color:"var(--lime)",opacity:.85}}>Você está aqui</div>
                  <div style={{fontSize:14,fontWeight:600,color:"var(--text)"}}>{e.texto}</div>
                </div>
                <button className="btn btn-primary btn-sm" onClick={() => onAvancar(p)}>✓ Avancei</button>
              </div>
            );
          }
          return (
            <div key={e.id} className="row" style={{gap:10,padding:"5px 0",cursor:"pointer"}} onClick={() => onToggleEtapa(p, e.id)}>
              <span style={{color:e.concluida?"var(--lime)":"var(--text-3)",fontSize:15}}>{e.concluida?"◉":"○"}</span>
              <span style={{fontSize:13,color:e.concluida?"var(--text-3)":"var(--text-2)",textDecoration:e.concluida?"line-through":"none"}}>{e.texto}</span>
            </div>
          );
        })}
        {p.etapas.length === 0 && (
          <div style={{fontSize:12,color:"var(--text-3)",padding:"6px 0"}}>Sem etapas ainda — toque em ✎ para adicionar.</div>
        )}
        {nextIdx === -1 && p.etapas.length > 0 && (
          <div style={{fontSize:12,color:"var(--lime)",padding:"6px 0"}}>🎉 Trilha completa!</div>
        )}
      </div>
    </div>
  );
}

function RotinasFooter({ rotinas, onToggle, onAdd, onRemove }) {
  const feitas = rotinas.filter(r => r.etapas[0] && r.etapas[0].concluida).length;
  return (
    <div style={{borderTop:"1px solid var(--border)",paddingTop:14,marginTop:22}}>
      <div className="row" style={{justifyContent:"space-between",marginBottom:9}}>
        <div className="row" style={{gap:6}}>
          <span style={{fontSize:12,fontWeight:600,color:"var(--text-2)"}}>🔁 Rotinas</span>
          {rotinas.length>0 && <span style={{fontSize:11,color:"var(--text-3)"}}>{feitas}/{rotinas.length}</span>}
        </div>
        <button className="btn btn-ghost btn-sm" onClick={onAdd}>+ rotina</button>
      </div>
      <div className="row" style={{gap:7,flexWrap:"wrap"}}>
        {rotinas.map((r,i) => {
          const done = r.etapas[0] && r.etapas[0].concluida;
          return (
            <span key={i} onClick={() => onToggle(r)} onDoubleClick={() => { if(confirm("Remover rotina?")) onRemove(r); }}
              className="chip" style={{cursor:"pointer",padding:"5px 11px",
                background:done?"var(--lime-soft)":"transparent",
                color:done?"var(--lime)":"var(--text-3)",
                border:done?"1px solid #7fd85840":"1px solid var(--border-strong)"}}>
              {done?"✓":"○"} {r.projeto}
            </span>
          );
        })}
        {rotinas.length===0 && <span style={{fontSize:12,color:"var(--text-3)"}}>Nenhuma rotina. Toque em “+ rotina”.</span>}
      </div>
    </div>
  );
}

function EmptyState({ onAdd }) {
  return (
    <div style={{textAlign:"center",padding:"36px 16px",color:"var(--text-3)"}}>
      <div style={{fontSize:34,marginBottom:10}}>🌱</div>
      <div style={{fontSize:14,color:"var(--text-2)",marginBottom:4}}>Comece sua primeira trilha</div>
      <div style={{fontSize:12,marginBottom:16}}>Quebre um projeto árduo em 3–5 etapas e nunca mais perca o próximo passo.</div>
      <button className="btn btn-primary btn-sm" onClick={onAdd}>+ Criar projeto</button>
    </div>
  );
}

/* ============ EDITOR ============ */
function EditorModal({ editing, onClose, onSave }) {
  const isNew = editing.ref === "new";
  const isRotina = editing.tipo === "Rotina";
  const [projeto, setProjeto] = useState(isNew ? "" : editing.projeto);
  const [categoria, setCategoria] = useState(isNew ? CATEGORIAS[0].nome : editing.categoria);
  const [rotinaFreq, setRotinaFreq] = useState(editing.rotinaFreq || "Diaria");
  const [etapas, setEtapas] = useState(isNew ? [""] : editing.etapas.map(e => e.texto));

  const emoji = (CATEGORIAS.find(c => c.nome === categoria) || {}).emoji || "•";

  function build() {
    const base = isNew ? {} : editing.ref;
    const etapasClean = isRotina ? [projeto] : etapas.map(s => s.trim()).filter(Boolean);
    const oldEtapas = (!isNew && editing.etapas) || [];
    return {
      projeto: projeto.trim() || "Sem nome",
      categoria, emoji, tipo: editing.tipo, rotinaFreq,
      favorito: !isNew ? editing.favorito : false,
      ultimoAvanco: !isNew ? editing.ultimoAvanco : "",
      etapas: etapasClean.map((texto, i) => {
        const prev = oldEtapas[i];
        return { id: prev ? prev.id : uid(), texto, ordem: i, concluida: prev ? prev.concluida : false };
      }),
    };
  }

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="row" style={{justifyContent:"space-between",marginBottom:16}}>
          <span style={{fontSize:16,fontWeight:600}}>
            {isNew ? (isRotina?"Nova rotina":"Novo projeto") : "Editar"}
          </span>
          <span onClick={onClose} style={{cursor:"pointer",color:"var(--text-3)",fontSize:18}}>✕</span>
        </div>

        <div style={{marginBottom:14}}>
          <label>{isRotina?"Nome da rotina":"Nome do projeto"}</label>
          <input value={projeto} onChange={e => setProjeto(e.target.value)}
            placeholder={isRotina?"Ex: Oração":"Ex: Aprender violino"} autoFocus />
        </div>

        {!isRotina && (
          <div style={{marginBottom:14}}>
            <label>Categoria</label>
            <select value={categoria} onChange={e => setCategoria(e.target.value)}>
              {CATEGORIAS.map(c => <option key={c.nome} value={c.nome}>{c.emoji} {c.nome}</option>)}
            </select>
          </div>
        )}

        {isRotina && (
          <div style={{marginBottom:14}}>
            <label>Frequência</label>
            <select value={rotinaFreq} onChange={e => setRotinaFreq(e.target.value)}>
              <option value="Diaria">Diária (reseta todo dia)</option>
              <option value="Semanal">Semanal (reseta domingo)</option>
            </select>
          </div>
        )}

        {!isRotina && (
          <div style={{marginBottom:16}}>
            <label>Etapas da trilha (a ordem é o caminho)</label>
            {etapas.map((et, i) => (
              <div key={i} className="row" style={{gap:6,marginBottom:6}}>
                <span style={{color:"var(--text-3)",fontSize:12,width:16}}>{i+1}.</span>
                <input value={et} onChange={e => setEtapas(etapas.map((x,j)=>j===i?e.target.value:x))}
                  placeholder={`Etapa ${i+1}`} />
                <span onClick={() => setEtapas(etapas.filter((_,j)=>j!==i))}
                  style={{cursor:"pointer",color:"var(--text-3)",padding:"0 4px"}}>✕</span>
              </div>
            ))}
            <button className="btn btn-ghost btn-sm" onClick={() => setEtapas([...etapas, ""])}>+ etapa</button>
          </div>
        )}

        <div className="row" style={{gap:8,marginTop:8}}>
          <button className="btn btn-primary" style={{flex:1,justifyContent:"center"}}
            onClick={() => onSave(build(), isNew)}>Salvar</button>
          {!isNew && (
            <button className="btn" style={{borderColor:"var(--danger)",color:"var(--danger)"}}
              onClick={() => { if(confirm("Excluir este item?")) { onSave(null, false); onClose(); location.reload(); } }}>Excluir</button>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
